<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WeChat Agent Send Queue</title>
    <link rel="stylesheet" href="/styles.css?v=20260629-3" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Send Audit</h1>
          <p id="readinessLine">Loading...</p>
        </div>
        <button id="refreshButton" class="icon-button" title="Refresh" aria-label="Refresh">R</button>
      </header>

      <section class="controls">
        <label>
          <span>Mode</span>
          <select id="modeSelect">
            <option value="dry_run">dry_run</option>
            <option value="confirm">confirm</option>
            <option value="auto">auto</option>
          </select>
        </label>
        <label class="toggle">
          <input id="sendEnabled" type="checkbox" />
          <span>Send enabled</span>
        </label>
        <label>
          <span>Driver</span>
          <select id="driverSelect">
            <option value="not_implemented">not_implemented</option>
            <option value="windows_guarded">windows_guarded</option>
          </select>
        </label>
        <button id="saveControls" class="primary">Save controls</button>
      </section>

      <section class="status-grid">
        <div>
          <span>pending</span>
          <strong id="pendingCount">0</strong>
        </div>
        <div>
          <span>approved</span>
          <strong id="approvedCount">0</strong>
        </div>
        <div>
          <span>failed</span>
          <strong id="failedCount">0</strong>
        </div>
      </section>

      <nav class="tabs">
        <button class="tab active" data-status="pending">Pending</button>
        <button class="tab" data-status="approved">Approved</button>
        <button class="tab" data-status="failed">Failed</button>
        <button class="tab" data-status="sent">Sent</button>
        <button class="tab" data-status="rejected">Rejected</button>
      </nav>

      <section id="queueList" class="queue-list"></section>

      <section class="audit">
        <div class="section-head">
          <h2>Audit Log</h2>
          <button id="probeButton" class="ghost">Probe after 3s</button>
        </div>
        <p class="hint">For probe/send, click the button and switch focus to the target WeChat chat before the countdown ends.</p>
        <pre id="probeBox"></pre>
        <div id="auditList" class="audit-list"></div>
      </section>
    </main>
    <script src="/app.js?v=20260629-3"></script>
  </body>
</html>
